# 通用任务派发路由表 (v5 · 零预算 + cursor 队列兜底)
# 参见 rules/cursor-delegated-escalation.md (策略文档, 人读).
# 本文件是机器可读伴侣: Python dispatcher 读这里的数字 + 枚举.
#
# v5 重大变更 (2026-04-20):
#   - 删除所有 cloud fallback 字段 (cloud_model, fallback.executor=cloud, ...)
#   - 改为 cursor_queue 作为失败兜底 (人工触发 Cursor 处理)
#   - 删除月度云预算字段 (0 预算)
#   - 路径更新: D:\brain → D:\second-brain-content, D:\brain-assets → D:\second-brain-assets

schema_version: "2.0"
updated: "2026-04-20"

# ============================================================
# 全局默认值 (单任务未覆盖时用)
# ============================================================
defaults:
  cursor_queue_dir: "D:\\second-brain-assets\\_cursor_queue"   # 本地失败入队
  telemetry_log_dir: "C:\\dev-projects\\second-brain-hub\\telemetry\\logs"

# ============================================================
# 任务路由表
# ============================================================
tasks:

  # --------------------------------------------------------
  # PDF 分类 (Phase A3 前由 PS pipeline 跑; A3 后由 Python agent 跑)
  # --------------------------------------------------------
  pdf-classify:
    description: "PDF 文档分类 + 路径分配 + 摘要"
    mode: batch-pipeline
    primary:
      executor: local
      model: "qwen2.5:14b-instruct"
      timeout_sec: 300
      max_retries_on_schema_fail: 2
    # v5 无 cloud fallback. 本地失败入队人工处理.
    on_failure:
      action: enqueue_cursor
      queue_dir: "D:\\second-brain-assets\\_cursor_queue"
      include_context: ["source_file", "source_hash", "local_attempt", "reason"]
    escalate_when:
      confidence_below: 0.70
      schema_fail_count: 2
      category_equals: "other"
      timeout_exceeded: true
    input:
      source_dir: "D:\\second-brain-assets\\99-inbox"
      file_pattern: "*.pdf"
    output:
      target_root: "D:\\second-brain-assets"       # Tier B
      pointer_root: "D:\\second-brain-content"     # Tier A

  # --------------------------------------------------------
  # Inbox 纯文本路由 (Phase A2 落地)
  # --------------------------------------------------------
  inbox-text-route:
    description: "Caps+D paste-*.md 自动分类 + 实体抽取 + 标签 + 归档"
    mode: batch-pipeline
    primary:
      executor: local
      model: "qwen2.5:14b-instruct"
      timeout_sec: 60
    on_failure:
      action: enqueue_cursor
      queue_dir: "D:\\second-brain-assets\\_cursor_queue"
    escalate_when:
      confidence_below: 0.75
      action_equals_create_new_top_level_dir: true
      touches_existing_memory_file: true
      ambiguous_intent: true
    input:
      source_dir: "D:\\second-brain-content\\99-inbox"
      file_pattern: "paste-*.md"
    output:
      target_root: "D:\\second-brain-content"
    status: not-implemented

  # --------------------------------------------------------
  # Inbox 文件路由 (Phase A3 落地)
  # --------------------------------------------------------
  inbox-file-route:
    description: "D:/second-brain-assets/99-inbox/ 非 PDF 文件分类"
    mode: batch-pipeline
    primary:
      executor: local
      model_by_type:
        "*.jpg|*.png|*.jpeg": "llava:13b"
        "*.mp3|*.m4a|*.wav": "faster-whisper"
        "*.pdf": "qwen2.5:14b-instruct"
        "*": "rule-based"
      timeout_sec: 180
    on_failure:
      action: enqueue_cursor
      queue_dir: "D:\\second-brain-assets\\_cursor_queue"
    escalate_when:
      confidence_below: 0.70
      timeout_exceeded: true
    input:
      source_dir: "D:\\second-brain-assets\\99-inbox"
      file_pattern: "*"
    status: not-implemented

  # --------------------------------------------------------
  # Caps+D 交互快速问答 (Phase A1 落地)
  # --------------------------------------------------------
  capsd-quick-ask:
    description: "Caps+D 长按: 快速问答本地 brain"
    mode: interactive
    primary:
      executor: local
      model: "qwen2.5:3b"
      timeout_sec: 10
    on_failure:
      action: prompt_user_to_use_cursor     # 交互场景直接提醒用户去 Cursor 问
    escalate_when:
      confidence_below: 0.80
    status: not-implemented

  # --------------------------------------------------------
  # 图像分类 (Phase A3 落地)
  # --------------------------------------------------------
  image-classify:
    description: "照片/图片分类, 场景/时间定位 (无人脸识别)"
    mode: batch-pipeline
    primary:
      executor: local
      model: "llava:13b"
      timeout_sec: 120
    on_failure:
      action: enqueue_cursor
      queue_dir: "D:\\second-brain-assets\\_cursor_queue"
    escalate_when:
      confidence_below: 0.70
      contains_people: true                # 有人脸入队 (隐私二次确认)
    status: not-implemented

  # --------------------------------------------------------
  # 写作助手 (Phase A4 落地)
  # --------------------------------------------------------
  write-assist:
    description: "四层知识模型组合 + self-critique + provenance"
    mode: interactive
    primary:
      executor: local
      model: "qwen2.5:14b-instruct"
      timeout_sec: 600
    on_failure:
      action: enqueue_cursor
      queue_dir: "D:\\second-brain-assets\\_cursor_queue"
      reason_hint: "writing_polish"          # Cursor 处理时知道这是润色请求
    escalate_when:
      confidence_below: 0.70
      cliche_hit_count_above: 3             # 陈词命中太多入队让 Cursor 改
    status: not-implemented

  # --------------------------------------------------------
  # 人际关系引擎 (Phase A5 落地)
  # --------------------------------------------------------
  people-extract:
    description: "从对话/文本中抽取人物 + 事件 + 承诺"
    mode: batch-pipeline
    primary:
      executor: local
      model: "qwen2.5:14b-instruct"
      timeout_sec: 60
    on_failure:
      action: enqueue_cursor
      queue_dir: "D:\\second-brain-assets\\_cursor_queue"
    escalate_when:
      confidence_below: 0.75
      alias_ambiguity: true                 # 别名歧义入队人工确认
    status: not-implemented

# ============================================================
# 优先级规则 (所有任务共用, 按顺序匹配)
# ============================================================
priority_rules:
  # 硬红线: Tier C 黑名单, 无条件终止
  - match:
      source_path_in_blacklist: true       # 命中 ~/.brain-exclude.txt
    action: terminate
    reason: "Tier C sensitive path"

  # PII 检测命中: 进 Tier C, 不嵌入向量
  - match:
      pii_detected: true                    # presidio 检出 BSN/银行卡/医疗号
    action: route_to_tier_c
    target_dir: "D:\\second-brain-content\\06-sensitive"
    note: "skip vector embedding"

  # L3 破坏性 git: 必须用户明确同意
  - match:
      operation_in: ["git-push-force", "git-reset-hard", "delete-dot-git"]
    action: require_user_consent
    level: L3

# ============================================================
# 反馈循环 (把 cursor_queue 处理结果反哺本地 few-shot)
# ============================================================
feedback_loop:
  enabled: true
  harvest_from: "D:\\second-brain-assets\\_cursor_queue\\*.processed.md"
  dest_few_shot_dir: "C:\\dev-projects\\second-brain-hub\\prompts\\few-shot"
  review_before_merge: false               # v5 下自动入库, git 可回退
  schedule: "weekly"

# ============================================================
# Agent 安全网 (每次 agent 写入必经)
# ============================================================
safety_net:
  auto_commit: true
  backup_branch_pattern: "agent/{agent_name}/{timestamp}"
  commit_message_prefix: "[agent:{agent_name}]"
  restore_command: "brain restore --last-clean"
