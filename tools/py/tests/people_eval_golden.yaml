version: 1
description: "A5 fixed golden set (curated real contacts, stable over time)"
cases:
  - id: golden_who_alice_zhang
    type: who
    input:
      name: "Alice Zhang"
    expect:
      min_results: 1
  - id: golden_context_alice_zhang
    type: context
    input:
      name: "Alice Zhang"
      since_days: 3650
      limit: 5
    expect:
      require_contact: true
      require_keys:
        - "contact"
        - "recent_interactions"
        - "graph_hints"
      graph_hints_status_in:
        - "ok"
        - "skipped"

