    query: "荷兰公证员流程"
    expected_any:
      - "notariaat"
      - "koper"
      - "housing"
  - id: invoice_tax
    query: "荷兰发票和税务"
    expected_any:
      - "factuur"
      - "invoice"
      - "btw"
  - id: people_overdue
    query: "谁最近40天没联系"
    expected_any:
      - "brain-health"
      - "digest"
      - "people"
