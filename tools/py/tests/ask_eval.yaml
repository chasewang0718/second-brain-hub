    query: "wechat 缓存 项目"
    expected_any:
      - "wechat"
      - "project"
      - "cache"
  - id: structure_opt
    query: "目录结构优化建议"
    expected_any:
      - "structure"
      - "history"
      - "dry-run"
  - id: writing_constraints
    query: "写作约束 banned phrases"
    expected_any:
      - "writing"
      - "constraints"
      - "config"
  - id: cursor_queue
    query: "cursor queue 失败兜底"
    expected_any:
      - "cursor_queue"
      - "queue"
      - "escalation"
  - id: digest_weekly
    query: "每周回顾摘要"
    expected_any:
      - "weekly"
      - "digest"
      - "review"
  - id: ask_engine
    query: "ask 检索 混合重排"
    expected_any:
      - "ask"
      - "retrieval"
      - "hybrid"
  - id: mcp_paths
    query: "mcp 读取 paths 配置"
